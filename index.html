<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Candy Bubble Bet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="phone-shell">
    <button class="menu-button" id="menuButton" type="button" aria-label="Menu">MENU</button>
    <section class="game-menu" id="gameMenu" aria-label="Game menu">
      <button id="forceCollect" type="button">Drop 3 COL - Free</button>
      <button id="bgmToggle" type="button">BGM ON</button>
      <button id="sfxToggle" type="button">SFX ON</button>
    </section>

    <section class="bonus-strip" id="bonusStrip">
      <div>
        <span class="label">Collect</span>
        <strong><span id="collect">0</span>/3</strong>
      </div>
      <div>
        <span class="label">Mode</span>
        <strong id="mode">Base</strong>
      </div>
      <div>
        <span class="label">Free</span>
        <strong id="freeShots">0</strong>
      </div>
    </section>

    <section class="game-stage">
      <canvas id="game" width="390" height="640" aria-label="Candy bubble shooter game"></canvas>
      <div class="floating-log" id="log"></div>
    </section>

    <section class="bottom-panel">
      <div class="special-legend pay-legend" aria-label="PAY candy paytable">
        <span id="legend-pay-1">1x</span>
        <span id="legend-pay-3">3x</span>
        <span id="legend-pay-5">5x</span>
        <span id="legend-pay-10">10x</span>
        <span id="legend-pay-20">20x</span>
      </div>

      <div class="ball-legend" aria-label="Shot ball legend">
        <span><b>BOX</b> drops: opens a random pay</span>
        <span><b>Special Balls</b> Rainbow / Bomb / Mult</span>
      </div>

      <div class="topbar">
        <div>
          <span class="label">Balance</span>
          <strong id="credit">10000</strong>
        </div>
        <div>
          <span class="label">Bet</span>
          <strong id="bet">100</strong>
        </div>
        <div>
          <span class="label">Win Score</span>
          <strong id="win">0</strong>
        </div>
      </div>

      <div class="win-detail" id="winDetail">No win yet</div>

      <div class="controls">
        <button id="betDown" type="button" aria-label="Bet down">-</button>
        <button id="shoot" type="button">SHOOT</button>
        <button id="betUp" type="button" aria-label="Bet up">+</button>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
